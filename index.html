<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Чат-рулетка (tmi.js)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #f0f2f5; }
        .card { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: none; }
        .card-header { background: linear-gradient(135deg, #7F00FF 0%, #E100FF 100%); color: white; border-radius: 20px 20px 0 0 !important; }
        .winner-announce { font-size: 2rem; font-weight: 700; color: #28a745; background: #e9f7ef; border-radius: 60px; padding: 16px 32px; display: inline-block; }
        .participant-item { background: #f8f9fa; border-radius: 30px; padding: 6px 16px; margin: 4px; display: inline-block; }
        .participant-item .last-win { font-size: 0.75rem; color: #6c757d; margin-left: 8px; }
        .participant-item .cooldown-lock { color: #dc3545; margin-left: 6px; }
        #participantsContainer { min-height: 60px; max-height: 300px; overflow-y: auto; border: 1px dashed #dee2e6; border-radius: 16px; padding: 10px; background: #ffffff; }
        .status-badge { font-size: 1rem; padding: 8px 18px; border-radius: 30px; }
        .btn-gradient { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border: none; color: white; font-weight: 600; }
        .btn-gradient:hover { transform: scale(1.03); opacity: 0.9; }
        .btn-success-gradient { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); border: none; color: #000; font-weight: 600; }
        .btn-success-gradient:hover { transform: scale(1.03); opacity: 0.9; }
        .table-hover tbody tr:hover { background-color: #f1f3f5; }
        .btn-clear { background: #ffc107; border: none; }
        .btn-clear:hover { background: #e0a800; }
        .debug-log { background: #1e1e1e; color: #d4d4d4; padding: 8px; border-radius: 8px; font-family: monospace; max-height: 100px; overflow-y: auto; font-size: 0.8rem; }
    </style>
</head>
<body>
<div class="container py-4">
    <h1 class="display-5 fw-bold mb-4"><i class="bi bi-dice-6-fill text-primary"></i> Чат-рулетка</h1>
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card">
                <div class="card-header"><i class="bi bi-gear-fill me-2"></i> Управление</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label"><i class="bi bi-person-badge"></i> Канал</label>
                            <input type="text" class="form-control" id="channelInput" value="veigardi" placeholder="ник стримера">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label"><i class="bi bi-tag"></i> Ключевое слово</label>
                            <input type="text" class="form-control" id="keywordInput" value="розыгрыш" placeholder="например, розыгрыш">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label"><i class="bi bi-hourglass-split"></i> Кулдаун (дней)</label>
                            <input type="number" class="form-control" id="cooldownInput" value="7" min="0">
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button class="btn btn-success-gradient w-100" id="connectBtn"><i class="bi bi-plug"></i> Подключиться</button>
                            <button class="btn btn-danger w-100 ms-2" id="disconnectBtn" disabled><i class="bi bi-x-circle"></i> Откл.</button>
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button class="btn btn-clear w-100" id="clearParticipantsBtn" disabled><i class="bi bi-eraser"></i> Очистить уч.</button>
                        </div>
                    </div>
                    <hr>
                    <div class="d-flex flex-wrap align-items-center gap-3 mt-2">
                        <span class="status-badge badge bg-secondary" id="statusBadge"><i class="bi bi-circle"></i> Не подключено</span>
                        <button class="btn btn-gradient btn-lg" id="pickBtn" disabled><i class="bi bi-dice-5"></i> Выбрать победителя!</button>
                        <span class="badge bg-info" id="participantCounter">Участников: 0</span>
                    </div>
                    <div id="winnerDisplay" class="text-center mt-3" style="min-height: 80px;"></div>
                    <div class="debug-log" id="debugLog">[Отладка] Готов к работе...</div>
                </div>
            </div>
            <div class="card mt-4">
                <div class="card-header"><i class="bi bi-people-fill me-2"></i> Участники (собираются автоматически)</div>
                <div class="card-body">
                    <div id="participantsContainer"><span class="text-muted">Нет участников</span></div>
                    <div class="mt-2 small text-muted">
                        <i class="bi bi-info-circle"></i> Список пополняется, когда зрители пишут ключевое слово. 
                        <span class="text-success">✔</span> — может участвовать, <span class="text-danger">🔒</span> — на кулдауне.
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="card">
                <div class="card-header"><i class="bi bi-trophy-fill me-2"></i> Последние победители</div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead><tr><th>#</th><th>Пользователь</th><th>Дата</th></tr></thead>
                            <tbody id="winnersTableBody"><tr><td colspan="3" class="text-center text-muted">Нет записей</td></tr></tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer text-muted small d-flex justify-content-between">
                    <span><i class="bi bi-database"></i> Хранится в браузере</span>
                    <button class="btn btn-outline-danger btn-sm" id="clearWinnersBtn"><i class="bi bi-trash"></i> Очистить</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Подключаем tmi.js -->
<script src="https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/tmi.min.js"></script>

<script>
// ========== Глобальные ==========
let client = null;
let connected = false;
let participants = [];
let isCollecting = false;
const STORAGE_KEY = 'twitchRouletteWinners';
const debugLog = document.getElementById('debugLog');

function logDebug(msg) {
    debugLog.innerHTML += `<div>${new Date().toLocaleTimeString()} — ${msg}</div>`;
    debugLog.scrollTop = debugLog.scrollHeight;
}

// DOM
const channelInput = document.getElementById('channelInput');
const keywordInput = document.getElementById('keywordInput');
const cooldownInput = document.getElementById('cooldownInput');
const connectBtn = document.getElementById('connectBtn');
const disconnectBtn = document.getElementById('disconnectBtn');
const pickBtn = document.getElementById('pickBtn');
const clearParticipantsBtn = document.getElementById('clearParticipantsBtn');
const statusBadge = document.getElementById('statusBadge');
const participantCounter = document.getElementById('participantCounter');
const participantsContainer = document.getElementById('participantsContainer');
const winnerDisplay = document.getElementById('winnerDisplay');
const winnersTableBody = document.getElementById('winnersTableBody');
const clearWinnersBtn = document.getElementById('clearWinnersBtn');

// ========== Работа с победителями ==========
function getWinners() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
}
function saveWinners(w) { localStorage.setItem(STORAGE_KEY, JSON.stringify(w)); }
function addWinner(username, keyword) {
    const w = getWinners();
    w.push({ username, keyword, timestamp: new Date().toISOString() });
    saveWinners(w);
    renderWinners();
}
function clearWinners() { if (confirm('Удалить всех победителей?')) { saveWinners([]); renderWinners(); } }

function getLastWinDate(username) {
    const wins = getWinners().filter(w => w.username.toLowerCase() === username.toLowerCase());
    if (!wins.length) return null;
    wins.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
    return new Date(wins[0].timestamp);
}

function renderWinners() {
    const wins = getWinners().slice(-20).reverse();
    if (!wins.length) { winnersTableBody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">Нет записей</td></tr>'; return; }
    let html = '';
    wins.forEach((w, i) => {
        const d = new Date(w.timestamp).toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
        html += `<tr><td>${i+1}</td><td><strong>${w.username}</strong></td><td>${d}</td></tr>`;
    });
    winnersTableBody.innerHTML = html;
}

// ========== Обновление UI участников ==========
function updateParticipantsUI() {
    if (!participants.length) {
        participantsContainer.innerHTML = '<span class="text-muted">Нет участников</span>';
        participantCounter.textContent = 'Участников: 0';
        return;
    }
    const cooldownDays = parseInt(cooldownInput.value) || 0;
    let html = '';
    participants.forEach(p => {
        const last = getLastWinDate(p.username);
        let info = '', lock = '';
        if (last) {
            const diff = (new Date() - last) / (1000*60*60*24);
            const ok = diff >= cooldownDays;
            info = `посл.выигрыш: ${last.toLocaleDateString('ru-RU')}`;
            lock = ok ? '' : ' 🔒';
        } else {
            info = 'нет выигрышей';
        }
        html += `<span class="participant-item">${p.username} <span class="last-win">${info}</span>${lock}</span>`;
    });
    participantsContainer.innerHTML = html;
    participantCounter.textContent = `Участников: ${participants.length}`;
}

function addParticipant(username) {
    if (!participants.some(p => p.username.toLowerCase() === username.toLowerCase())) {
        participants.push({ username });
        logDebug(`➕ Добавлен участник: ${username}`);
        updateParticipantsUI();
    } else {
        logDebug(`⚠️ Участник ${username} уже есть в списке`);
    }
}

function clearParticipants() {
    if (participants.length === 0) return;
    if (confirm('Очистить список участников?')) {
        participants = [];
        updateParticipantsUI();
        logDebug('🧹 Список участников очищен');
    }
}

// ========== Подключение через tmi.js ==========
function connectToTwitch() {
    const channel = channelInput.value.trim();
    if (!channel) { alert('Введите канал'); return; }

    logDebug(`🔌 Подключение к каналу #${channel} через tmi.js...`);

    // Создаём клиента
    client = new tmi.Client({
        options: { debug: true },
        connection: { reconnect: true, secure: true },
        identity: { username: 'justinfan' + Math.floor(Math.random()*100000), password: 'oauth:justinfan' + Math.floor(Math.random()*100000) },
        channels: [channel]
    });

    // Обработчик подключения
    client.on('connected', (address, port) => {
        logDebug(`✅ Подключено к ${address}:${port}`);
        connected = true;
        isCollecting = true;
        statusBadge.className = 'status-badge badge bg-success';
        statusBadge.innerHTML = '<i class="bi bi-check-circle-fill"></i> Подключено (сбор активен)';
        connectBtn.disabled = true; disconnectBtn.disabled = false;
        pickBtn.disabled = false;
        clearParticipantsBtn.disabled = false;
        winnerDisplay.innerHTML = '<div class="text-success"><i class="bi bi-check-circle"></i> Бот слушает чат, участники добавляются автоматически</div>';
    });

    // Обработчик сообщений
    client.on('message', (channel, tags, message, self) => {
        if (self) return; // игнорируем свои сообщения

        const username = tags['display-name'] || tags['username'] || 'unknown';
        const keyword = keywordInput.value.trim().toLowerCase();

        logDebug(`👤 ${username}: "${message}"`);

        if (message.toLowerCase().includes(keyword) && isCollecting) {
            logDebug(`🔑 СОВПАДЕНИЕ с ключевым словом "${keyword}"! Добавляем ${username}`);
            addParticipant(username);
        } else {
            logDebug(`❌ Нет совпадения с "${keyword}"`);
        }
    });

    // Обработчик ошибок
    client.on('error', (err) => {
        logDebug(`❌ Ошибка tmi.js: ${err}`);
        alert('Ошибка подключения. Проверьте консоль.');
        disconnectFromTwitch();
    });

    // Обработчик отключения
    client.on('disconnected', (reason) => {
        logDebug(`🔴 Отключено: ${reason}`);
        disconnectFromTwitch();
    });

    // Подключаемся
    client.connect().catch(err => {
        logDebug(`❌ Не удалось подключиться: ${err}`);
        alert('Не удалось подключиться. Проверьте имя канала.');
        disconnectFromTwitch();
    });
}

function disconnectFromTwitch() {
    if (client) {
        client.disconnect();
        client = null;
    }
    connected = false;
    isCollecting = false;
    participants = [];
    updateParticipantsUI();
    statusBadge.className = 'status-badge badge bg-secondary';
    statusBadge.innerHTML = '<i class="bi bi-circle"></i> Не подключено';
    connectBtn.disabled = false; disconnectBtn.disabled = true;
    pickBtn.disabled = true;
    clearParticipantsBtn.disabled = true;
    pickBtn.textContent = '🎲 Выбрать победителя!';
    winnerDisplay.innerHTML = '';
    logDebug('⏹ Отключено');
}

// ========== Выбор победителя ==========
function pickWinner() {
    if (!connected) { alert('Подключитесь к чату'); return; }
    if (participants.length === 0) {
        winnerDisplay.innerHTML = `<div class="text-warning"><i class="bi bi-exclamation-triangle"></i> Нет участников</div>`;
        return;
    }
    const cooldownDays = parseInt(cooldownInput.value) || 0;
    const now = new Date();
    const eligible = participants.filter(p => {
        const last = getLastWinDate(p.username);
        if (!last) return true;
        return (now - last) / (1000*60*60*24) >= cooldownDays;
    });
    if (eligible.length === 0) {
        winnerDisplay.innerHTML = `<div class="text-warning"><i class="bi bi-clock"></i> Все участники на кулдауне (${cooldownDays} дн.)</div>`;
        return;
    }
    const winner = eligible[Math.floor(Math.random() * eligible.length)].username;
    addWinner(winner, keywordInput.value.trim() || '!розыгрыш');
    winnerDisplay.innerHTML = `<div class="winner-announce"><i class="bi bi-trophy"></i> 🎉 Победитель: ${winner} 🎉</div>`;
    participants = [];
    updateParticipantsUI();
    logDebug(`🏆 Победитель: ${winner}`);
}

// ========== Инициализация ==========
renderWinners();
connectBtn.addEventListener('click', connectToTwitch);
disconnectBtn.addEventListener('click', disconnectFromTwitch);
pickBtn.addEventListener('click', pickWinner);
clearParticipantsBtn.addEventListener('click', clearParticipants);
clearWinnersBtn.addEventListener('click', clearWinners);
setInterval(renderWinners, 5000);
logDebug('🚀 Страница загружена, ждём действий...');
</script>
</body>
</html>
